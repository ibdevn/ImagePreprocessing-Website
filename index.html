<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apple-Style Crop → 35x35</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/2.0.0/cropper.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #image-container { max-width: 400px; max-height: 400px; overflow: hidden; }
        #image-container img { max-width: 100%; }
        #controls { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Apple-Style Crop → 35x35</h1>
    <input type="file" id="file-input" accept="image/*">
    <div id="image-container">
        <img id="preview" style="display:none;" />
    </div>
    <div id="controls">
        <button id="zoom-in">Zoom In</button>
        <button id="zoom-out">Zoom Out</button>
        <button id="save">Save (35x35 .npy)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/2.0.0/cropper.min.js"></script>
    <script src="crop.js"></script>
</body>
</html>
